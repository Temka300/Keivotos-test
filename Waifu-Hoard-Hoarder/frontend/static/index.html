<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoarder</title>
<link rel="stylesheet" href="/static/style.css?v=096">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="#/browse">hoarder<span>.</span></a>
    <form id="search-form" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="search-input" type="text" placeholder="Search galleries…">
      <button id="private-toggle" type="button" title="Private search — hide query from the URL"></button>
    </form>
    <nav id="main-nav">
      <a href="#/browse" data-tab="browse">Browse</a>
      <a href="#/library" data-tab="library">Library</a>
      <a href="#/tags" data-tab="tags">Tags</a>
      <div class="queue-wrap">
        <button id="queue-btn" type="button" data-tab="queue">Queue<span id="queue-badge" class="badge hidden"></span></button>
        <div id="queue-panel" class="hidden"></div>
      </div>
      <a href="#/settings" data-tab="settings">Settings</a>
      <button id="blur-toggle" type="button" title="Toggle cover blur"></button>
    </nav>
  </div>
</header>

<div id="cf-banner" class="banner hidden">
  nhentai API unreachable right now (network or rate limit). Browsing is paused — your
  Library still works. Check <a href="#/settings">Settings</a> for status.
</div>

<main id="view"></main>

<div id="reader" class="hidden">
  <div id="reader-top">
    <span id="reader-title"></span>
    <span id="reader-counter"></span>
    <button id="reader-info-btn" class="reader-btn" onclick="toggleReaderMeta()" title="Toggle info (i)">Info</button>
    <button class="reader-btn" onclick="closeReader()" title="Close (Esc)">&#10005;</button>
  </div>
  <div id="reader-body">
    <div id="reader-stage">
      <div id="reader-prev" title="Previous page"></div>
      <img id="reader-img" alt="">
      <div id="reader-next" title="Next page"></div>
    </div>
    <aside id="reader-meta"></aside>
  </div>
</div>

<script src="/static/app.js?v=098"></script>
</body>
</html>
