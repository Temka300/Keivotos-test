name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    env:
      KEIVOTOS_HOME: ${{ runner.temp }}\Keivotos
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Sync Python environment
        run: uv sync --locked --python 3.11
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm.cmd ci
      - name: Check frontend
        working-directory: frontend
        run: npm.cmd run check
      - name: Build frontend
        working-directory: frontend
        run: npm.cmd run build
      - name: Check Python syntax
        run: uv run python -m compileall -q .\backend .\scripts .\app.py
      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v
      - name: Verify source runtime layout
        run: uv run python app.py --portable-check
