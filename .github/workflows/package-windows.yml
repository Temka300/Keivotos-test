name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the V prefix
        required: true
        default: "1.0.0"

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    env:
      KEIVOTOS_HOME: ${{ runner.temp }}\Keivotos
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Build and verify portable archive
        shell: pwsh
        run: .\scripts\release\build_windows.ps1 -Version "${{ inputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: Keivotos-V${{ inputs.version }}-windows-x64
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error
